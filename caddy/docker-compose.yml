# Caddy trung tâm — reverse proxy + HTTPS tự động cho mọi WP site của factory.
# Đứng trên network latvps_proxy chung; mỗi WP container join net này để Caddy vào được.
# ACME_EMAIL đọc từ caddy/.env (install.sh sinh ra).
name: latvps-caddy

services:
  caddy:
    build:
      context: .
    image: latvps-caddy:local
    container_name: latvps_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./sites:/etc/caddy/sites:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: latvps_proxy

volumes:
  caddy_data:
  caddy_config:
